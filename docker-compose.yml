services:
  api:
    build:
      context: .
      target: api
    container_name: mcstyle-api
    ports:
      - "5859:5858"
    volumes:
      - mcstyle-data:/app/data
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - ADMIN_DISCORD_ID=${ADMIN_DISCORD_ID:-}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI:-https://mcstyle.notceleste.xyz}
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    container_name: mcstyle-web
    ports:
      - "5858:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mcstyle-data:
